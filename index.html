<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Поддержка курьера</title>

<style>
body {
    font-family: Arial;
    background:#f3f3f3;
    margin:0;
}

.container {
    max-width:500px;
    margin:40px auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1 { font-size:20px; }

h3 { margin-top:20px; }

label {
    display:block;
    margin:6px 0;
}

textarea {
    width:100%;
    height:80px;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    resize:none;
}

button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-top:10px;
    cursor:pointer;
    font-size:15px;
}

.submit {
    background:#4CAF50;
    color:#fff;
}

.tip {
    background:#ff9800;
    color:#fff;
}

.small {
    font-size:12px;
    color:#777;
    text-align:center;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<h1>Спасибо за заказ 🙂</h1>

<p>Если всё прошло нормально — буду рад вашей оценке и поддержке</p>

<!-- ФОРМА FORMPSREE -->
<form action="https://formspree.io/f/xyklnzev" method="POST">

<h3>Оценка доставки</h3>

<label>
<input type="radio" name="rate" value="Отлично"> 👍 Отлично
</label>

<label>
<input type="radio" name="rate" value="Нормально"> 🙂 Нормально
</label>

<label>
<input type="radio" name="rate" value="Плохо"> 👎 Плохо
</label>

<h3>Комментарий</h3>

<textarea name="message" placeholder="Что можно улучшить?"></textarea>

<button class="submit" type="submit">Отправить отзыв</button>

</form>

<h3>Поддержать курьера ❤️</h3>

<button class="tip" onclick="window.location.href='https://t.me/'">
Оставить чаевые
</button>

<p class="small">
Спасибо за заказ 🙌
</p>

</div>

</body>
</html>
