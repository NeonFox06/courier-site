<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оценка курьера</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f8;
}

.container {
    max-width: 500px;
    margin: 0 auto;
    padding: 20px;
}

.card {
    background: #fff;
    padding: 18px;
    border-radius: 14px;
    margin-bottom: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
}

h1 {
    font-size: 22px;
    margin: 0;
}

.sub {
    color: #666;
    font-size: 14px;
    margin-top: 5px;
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    cursor: pointer;
    margin-top: 10px;
}

.rate {
    background: #2ecc71;
    color: white;
}

.tip {
    background: #ff9500;
    color: white;
}

.small {
    font-size: 12px;
    color: #888;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

<!-- ШАПКА -->
<div class="card">
<h1>Спасибо за заказ 🙂</h1>
<div class="sub">Оцените качество доставки и поддержите курьера</div>
</div>

<!-- ОТЗЫВ -->
<div class="card">
<h3>Оставить отзыв</h3>

<button class="rate"
onclick="window.location.href='https://forms.gle/ugqrzUeiA5hajzif6'">
Перейти к оценке ⭐
</button>

<p class="small">
После отправки данные попадают в таблицу и учитываются в рейтинге
</p>
</div>

<!-- ЧАЕВЫЕ -->
<div class="card">
<h3>Поддержать курьера ❤️</h3>

<button class="tip"
onclick="window.location.href='https://yoomoney.ru/fundraise/1HA1BEV13DT.260422'">
Оставить чаевые
</button>

<p class="small">
Спасибо за поддержку 🙌
</p>
</div>

</div>

</body>
</html>
